<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Administración de Productos</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:linear-gradient(135deg,#5b7cff,#7d57c2);
    min-height:100vh;
    padding:30px;
}

.contenedor{
    max-width:1200px;
    margin:auto;
    background:rgba(255,255,255,.15);
    backdrop-filter:blur(10px);
    padding:30px;
    border-radius:20px;
}

h1{
    color:white;
    text-align:center;
    margin-bottom:20px;
}

form{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
    margin-bottom:20px;
}

input{
    padding:12px;
    border:none;
    border-radius:10px;
}

button{
    padding:12px;
    border:none;
    border-radius:10px;
    background:#4CAF50;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#43a047;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
    border-radius:10px;
    overflow:hidden;
}

th{
    background:#4CAF50;
    color:white;
    padding:15px;
}

td{
    padding:12px;
    text-align:center;
}

tr:nth-child(even){
    background:#f4f4f4;
}

.editar{
    background:#2196F3;
    color:white;
    padding:8px 12px;
    text-decoration:none;
    border-radius:5px;
}

.eliminar{
    background:#f44336;
    color:white;
    padding:8px 12px;
    text-decoration:none;
    border-radius:5px;
}

.volver{
    display:inline-block;
    margin-bottom:20px;
    padding:12px 20px;
    background:#ff9800;
    color:white;
    text-decoration:none;
    border-radius:10px;
    font-weight:bold;
}

.volver:hover{
    background:#f57c00;
}
</style>
</head>

<body>

<div class="contenedor">

<h1>📦 Administración de Productos</h1>

<!-- navegación HTML -->
<a href="principal.html" class="volver">
    ⬅ Regresar a la Página Principal
</a>

<!-- MENSAJE SIMULADO -->
<div style="background:white;color:green;padding:10px;border-radius:10px;margin-bottom:15px;">
    Aquí aparecerán mensajes del sistema
</div>

<!-- FORMULARIO (SIN PHP) -->
<form action="agregar_producto.html" method="POST">

<input type="number" name="id_producto" placeholder="ID Producto" required>
<input type="text" name="nombre" placeholder="Nombre" required>
<input type="number" name="cantidad" placeholder="Cantidad" required>
<input type="number" step="0.01" name="precio" placeholder="Precio" required>

<button type="submit">Agregar</button>

</form>

<!-- TABLA -->
<table>

<tr>
    <th>ID</th>
    <th>Nombre</th>
    <th>Cantidad</th>
    <th>Precio</th>
    <th>Acciones</th>
</tr>

<!-- FILA DE EJEMPLO -->
<tr>
    <td>1</td>
    <td>Producto ejemplo</td>
    <td>10</td>
    <td>$100</td>
    <td>
        <a class="editar" href="editar_producto.html?id=1">Editar</a>
        <a class="eliminar" href="eliminar_producto.html?id=1"
           onclick="return confirm('¿Eliminar producto?')">Eliminar</a>
    </td>
</tr>

<tr>
    <td>2</td>
    <td>Otro producto</td>
    <td>5</td>
    <td>$50</td>
    <td>
        <a class="editar" href="editar_producto.html?id=2">Editar</a>
        <a class="eliminar" href="eliminar_producto.html?id=2"
           onclick="return confirm('¿Eliminar producto?')">Eliminar</a>
    </td>
</tr>

</table>

</div>

</body>
</html>
