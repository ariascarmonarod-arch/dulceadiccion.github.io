<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro de Usuario</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#5b7cff,#7d57c2);
}

.contenedor{
    width:500px;
    padding:40px;
    background:rgba(255,255,255,0.15);
    border-radius:25px;
    backdrop-filter:blur(10px);
    box-shadow:0 15px 40px rgba(0,0,0,.25);
    text-align:center;
}

h1{
    color:white;
    font-size:40px;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:15px;
    margin:10px 0;
    border:none;
    border-radius:12px;
    font-size:16px;
    background:white;
}

input:focus{
    outline:none;
}

button{
    width:100%;
    padding:18px;
    margin-top:15px;
    border:none;
    border-radius:18px;
    background:#4CAF50;
    color:white;
    font-size:20px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:scale(1.03);
    background:#43a047;
}

.mensaje{
    display:none;
    background:#e8f5e9;
    color:#2e7d32;
    padding:10px;
    border-radius:10px;
    margin-bottom:15px;
}

.volver-login{
    margin-top:20px;
}

.volver-login a{
    color:#FFD700;
    text-decoration:none;
    font-weight:bold;
    font-size:16px;
}

.volver-login a:hover{
    text-decoration:underline;
}

</style>
</head>
<body>

<div class="contenedor">

    <h1>Registro de Usuario</h1>

    <div class="mensaje" id="mensaje">
        Usuario registrado correctamente.
    </div>

    <form id="registroForm">

        <input
            type="number"
            id="id_usuario"
            placeholder="ID Usuario"
            required>

        <input
            type="text"
            id="nombre"
            placeholder="Nombre"
            required>

        <input
            type="text"
            id="apellido"
            placeholder="Apellido"
            required>

        <input
            type="password"
            id="contrasena"
            placeholder="Contraseña"
            required>

        <button type="submit">
            Registrar Usuario
        </button>

    </form>

    <div class="volver-login">
        <a href="login_cliente.html">
            ← Volver al inicio de sesión
        </a>
    </div>

</div>

<script>

document.getElementById("registroForm").addEventListener("submit", function(e){

    e.preventDefault();

    document.getElementById("mensaje").style.display = "block";

    setTimeout(function(){
        window.location.href = "login_cliente.html";
    }, 2000);

});

</script>

</body>
</html>
