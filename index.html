<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dulce Adicción - Bienvenido</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .container {
            text-align: center;
            padding: 40px 60px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 90%;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        p {
            font-size: 1.3rem;
            margin-bottom: 50px;
            opacity: 0.9;
        }

        .buttons {
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 18px 40px;
            font-size: 1.4rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 220px;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        .btn-cliente {
            background: #4CAF50;
            color: white;
        }

        .btn-cliente:hover {
            background: #45a049;
            transform: translateY(-8px);
            box-shadow: 0 10px 25px rgba(76, 175, 80, 0.4);
        }

        .btn-admin {
            background: #f44336;
            color: white;
        }

        .btn-admin:hover {
            background: #d32f2f;
            transform: translateY(-8px);
            box-shadow: 0 10px 25px rgba(244, 67, 54, 0.4);
        }

        .icon {
            font-size: 2.5rem;
            margin-bottom: 10px;
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍰 Dulce Adicción</h1>
        <p>Selecciona cómo deseas ingresar</p>

        <div class="buttons">
            <!-- Botón Cliente -->
            <a href="login_cliente.html" class="btn btn-cliente">
                <span class="icon">🛒</span>
                CLIENTE
            </a>

            <!-- Botón Administrador -->
            <a href="login_admin.html" class="btn btn-admin">
                <span class="icon">🔑</span>
                ADMINISTRADOR
            </a>
        </div>
    </div>
</body>
</html>
