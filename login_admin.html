<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Administrador</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#5b7cff,#7d57c2);
}

.contenedor{
    width:450px;
    padding:40px;
    background:rgba(255,255,255,0.15);
    border-radius:25px;
    backdrop-filter:blur(10px);
    box-shadow:0 15px 40px rgba(0,0,0,.25);
    text-align:center;
}

.icono{
    font-size:60px;
    margin-bottom:10px;
}

h1{
    color:white;
    margin-bottom:10px;
    font-size:42px;
}

.subtitulo{
    color:#e8e8e8;
    margin-bottom:35px;
    font-size:18px;
}

input{
    width:100%;
    padding:15px;
    margin:10px 0;
    border:none;
    border-radius:12px;
    font-size:16px;
}

input:focus{
    outline:none;
}

.boton{
    width:100%;
    padding:18px;
    margin-top:15px;
    border:none;
    border-radius:18px;
    background:#ff4338;
    color:white;
    font-size:20px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

.boton:hover{
    transform:scale(1.03);
    background:#e53935;
}

.error{
    display:none;
    background:#ffebee;
    color:#c62828;
    padding:10px;
    border-radius:10px;
    margin-bottom:15px;
}

.back-link{
    display:inline-block;
    margin-top:20px;
    color:white;
    text-decoration:none;
    font-weight:bold;
}

.back-link:hover{
    text-decoration:underline;
}
</style>
</head>
<body>

<div class="contenedor">

    <div class="icono">🔑</div>

    <h1>Administrador</h1>

    <p class="subtitulo">Inicia sesión para administrar la tienda</p>

    <div class="error" id="error">
        Usuario o contraseña incorrectos.
    </div>

    <form id="loginForm">

        <input type="text"
               id="nombre"
               placeholder="Nombre de administrador"
               required>

        <input type="password"
               id="contrasena"
               placeholder="Contraseña"
               required>

        <button class="boton" type="submit">
            🔑 INGRESAR
        </button>

    </form>

    <a href="principal.html" class="back-link">
        ← Volver a la selección
    </a>

</div>

<script>

document.getElementById("loginForm").addEventListener("submit", function(e){

    e.preventDefault();

    let usuario = document.getElementById("nombre").value;
    let password = document.getElementById("contrasena").value;

    // Usuario y contraseña de ejemplo
    if(usuario === "admin" && password === "1234"){

        window.location.href = "administrador.html";

    }else{

        document.getElementById("error").style.display = "block";

    }

});

</script>

</body>
</html>
